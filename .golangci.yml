version: "2"

run:
  concurrency: 4          # safer for CI runners
  timeout: 5m             # 10m is excessive for most pipelines
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  disable-all: true
  enable:
    # Core correctness
    - govet
    - staticcheck
    - gosimple
    - ineffassign
    - unused

    # Error handling
    - errorlint
    - errcheck

    # Code quality
    - gocritic
    - gocyclo
    - unparam
    - unconvert
    - predeclared

    # Style / formatting
    - gofmt
    - gofumpt
    - goimports
    - whitespace
    - godot
    - misspell

    # Maintainability
    - nestif
    - nakedret
    - dogsled
    - copyloopvar

    # Security
    - gosec

    # Imports / modules
    - gci
    - gomodguard

    # Misc useful
    - nolintlint
    - makezero
    - noctx
    - bodyclose
    - tparallel
    - thelper

    # Optional but useful
    - asciicheck
    - goconst
    - goprintffuncname
    - stylecheck

  # ❌ REMOVED (v2 incompatible)
  # - typecheck

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  exhaustive:
    default-signifies-exhaustive: true

  govet:
    enable-all: true
    disable:
      - fieldalignment   # noisy
      - shadow           # often too strict

  godot:
    exclude:
      - "^ -- "

  godox:
    keywords:
      - BUG
      - FIXME
      - HACK

  gci:
    sections:
      - standard
      - default
      - prefix(github.com/khulnasoft-lab/malicious-packages)

  gocyclo:
    min-complexity: 15   # avoid noise

  nestif:
    min-complexity: 4

  gocritic:
    enabled-checks:
      # Diagnostics
      - appendAssign
      - badCond
      - caseOrder
      - codegenComment
      - commentedOutCode
      - deprecatedComment
      - dupBranchBody
      - dupCase
      - dupSubExpr
      - exitAfterDefer
      - flagName
      - nilValReturn
      - weakCond
      - octalLiteral

      # Performance
      - appendCombine
      - rangeExprCopy
      - rangeValCopy

      # Style
      - boolExprSimplify
      - captLocal
      - commentFormatting
      - commentedOutImport
      - defaultCaseOrder
      - docStub
      - elseif
      - emptyFallthrough
      - hexLiteral
      - ifElseChain
      - methodExprCall
      - singleCaseSwitch
      - typeAssertChain
      - typeSwitchVar
      - underef
      - unlabelStmt
      - unlambda

      # Opinionated
      - builtinShadow
      - importShadow
      - initClause
      - nestingReduce
      - paramTypeCombine
      - ptrToRefParam
      - typeUnparen
      - unnecessaryBlock
